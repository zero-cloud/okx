name: 运行ETH实盘脚本（循环5小时重启）

on:
  # 关闭自动运行，只保留手动触发
  workflow_dispatch:

jobs:
  run-script-loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install httpx==0.27.2

      - name: 循环运行脚本（5小时一轮，永不停止）
        run: |
          # 定义要运行的多个Python文件（你可以自己增删）
          SCRIPTS=(
            # "ETH开空实盘GitHub.py" 
            "ETH开空实盘阶梯挂单GitHub.py"   
            "BTC开空实盘阶梯挂单GitHub.py"
          )

          # 5小时 = 18000秒
          RUN_DURATION=18000

          echo "=== 启动无限循环：每5小时重启一次 ==="

          # 永久循环
          while true; do
            echo "====================================="
            echo "新一轮启动：$(date)"
            echo "====================================="

            # 并行启动所有脚本
            for script in "${SCRIPTS[@]}"; do
              if [ -f "$script" ]; then
                echo "启动脚本：$script"
                python "$script" &
              else
                echo "脚本不存在：$script"
              fi
            done

            # 运行 5 小时
            sleep $RUN_DURATION

            # 5小时后，杀死所有Python进程，准备重启
            echo "5小时已到，重启所有脚本..."
            pkill -f "python" || true
            sleep 2
          done
