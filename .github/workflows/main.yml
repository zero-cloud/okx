name: 运行ETH实盘脚本

# on:
#   push:
#     branches: [ main ]
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install httpx==0.27.2
      - name: 运行脚本
        run: python "ETH开空实盘GitHub.py"
