name: 运行ETH实盘脚本（接力版）

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5小时后自动结束，不触发6小时限制

    steps:
      - uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install httpx==0.27.2

      - name: 运行脚本 5 小时
        run: |
          SCRIPTS=(
            # "ETH开空实盘GitHub.py" 
            "ETH开空实盘阶梯挂单GitHub.py"   
            "BTC开空实盘阶梯挂单GitHub.py"
            # "ETH开多实盘阶梯挂单GitHub.py"   
            # "BTC开多实盘阶梯挂单GitHub.py"
            # 其他脚本
          )

          pids=()
          for script in "${SCRIPTS[@]}"; do
            if [ -f "$script" ]; then
              python "$script" &
              pids+=($!)
            fi
          done

          # 运行 5 小时
          sleep 18000

          # 结束进程
          for pid in "${pids[@]}"; do
            kill $pid || true
          done

  # 关键：跑完自动再触发一次自己，实现无限接力
  trigger-next-run:
    needs: run-script
    runs-on: ubuntu-latest
    steps:
      - name: 触发下一轮运行
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: context.workflow,
              ref: context.ref
            })
